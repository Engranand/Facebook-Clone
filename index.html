<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Facebook Clone - NIET Greater Noida Project" />
  <meta name="author" content="Anand" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/fb-logo.png" />

  <title>Facebook - Log In or Sign Up</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet" />

  <!-- ── Anand's CSS ── -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/darkmode.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <!-- ── Teammates CSS ── -->
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/sidebar.css" />
  <link rel="stylesheet" href="css/stories.css" />
  <link rel="stylesheet" href="css/feed.css" />
  <link rel="stylesheet" href="css/rightbar.css" />

</head>
<body class="body">

  <!-- ================================================
       DARK MODE TOGGLE — Anand
       Checkbox hack — no JavaScript needed
  ================================================== -->
  <input type="checkbox" id="darkmode-toggle" hidden />

  <!-- ================================================
       NAVBAR — Gagana
  ================================================== -->
  <header role="banner">
    <nav class="navbar" aria-label="Main Navigation">

      <!-- Left: Logo + Search -->
      <div class="navbar__left">
        <a href="index.html" class="navbar__logo" aria-label="Facebook Home">
          <img src="assets/images/fb-logo.png" alt="Facebook Logo" width="40" height="40" />
        </a>
        <div class="navbar__search">
          <label for="search-input" class="sr-only">Search Facebook</label>
          <input
            type="search"
            id="search-input"
            class="navbar__search-input"
            placeholder="Search Facebook"
            aria-label="Search Facebook"
          />
          <span class="navbar__search-icon" aria-hidden="true">&#128269;</span>
        </div>
      </div>

      <!-- Center: Nav Links -->
      <nav class="navbar__center" aria-label="Primary Navigation">
        <ul class="navbar__nav-list" role="list">
          <li class="navbar__nav-item navbar__nav-item--active">
            <a href="index.html" class="navbar__nav-link" aria-label="Home" aria-current="page">
              <img src="assets/icons/home.svg" alt="Home" />
            </a>
          </li>
          <li class="navbar__nav-item">
            <a href="#" class="navbar__nav-link" aria-label="Friends">
              <img src="assets/icons/friends.svg" alt="Friends" />
            </a>
          </li>
          <li class="navbar__nav-item">
            <a href="#" class="navbar__nav-link" aria-label="Watch">
              <img src="assets/icons/watch.svg" alt="Watch" />
            </a>
          </li>
          <li class="navbar__nav-item">
            <a href="#" class="navbar__nav-link" aria-label="Marketplace">
              <img src="assets/icons/marketplace.svg" alt="Marketplace" />
            </a>
          </li>
          <li class="navbar__nav-item">
            <a href="#" class="navbar__nav-link" aria-label="Groups">
              <img src="assets/icons/groups.svg" alt="Groups" />
            </a>
          </li>
        </ul>
      </nav>

      <!-- Right: Actions -->
      <div class="navbar__right">
        <!-- Dark Mode Toggle Label -->
        <label for="darkmode-toggle" class="navbar__darkmode-btn" aria-label="Toggle Dark Mode">
          &#9790;
        </label>
        <a href="#" class="navbar__action-btn" aria-label="Messenger">
          <img src="assets/icons/messenger.svg" alt="Messenger" />
        </a>
        <a href="#" class="navbar__action-btn" aria-label="Notifications">
          <img src="assets/icons/bell.svg" alt="Notifications" />
          <span class="navbar__badge" aria-label="9 notifications">9</span>
        </a>
        <a href="#" class="navbar__action-btn" aria-label="Account Menu">
          <img src="assets/icons/menu.svg" alt="Menu" />
        </a>
        <a href="pages/profile.html" class="navbar__profile" aria-label="View Profile">
          <img
            src="assets/images/avatar.png"
            alt="Your Profile"
            width="36"
            height="36"
            class="navbar__avatar"
          />
        </a>
      </div>

    </nav>
  </header>

  <!-- ================================================
       MAIN PAGE WRAPPER
  ================================================== -->
  <div class="wrapper">

    <!-- ============================================
         LEFT SIDEBAR — Lahari
    ============================================== -->

          <footer class="post-card__footer">
            <!-- Bharti will build this -->

        </article>

        <!-- Post Card 3 -->
        <article class="post-card card" aria-label="Post by User">
          <header class="post-card__header">
            <!-- Bharti will build this -->
          </header>
          <div class="post-card__body">
            <!-- Bharti will build this -->
          </div>
          <footer class="post-card__footer">
            <!-- Bharti will build this -->

    <!-- ============================================
         RIGHT SIDEBAR — Komal
    ============================================== -->
    <aside class="right-sidebar" aria-label="Right Sidebar">

      <!-- Sponsored -->
      <section class="rightbar__sponsored" aria-label="Sponsored">
        <h3 class="rightbar__section-title">Sponsored</h3>
        <!-- Komal will build this -->
      </section>

      <!-- Birthdays -->
      <section class="rightbar__birthdays" aria-label="Birthdays">
        <h3 class="rightbar__section-title">Birthdays</h3>

      </section>

      <!-- Contacts -->
      <section class="rightbar__contacts" aria-label="Contacts">
        <div class="rightbar__contacts-header">
          <h3 class="rightbar__section-title">Contacts</h3>

  </div><!-- end .wrapper -->
